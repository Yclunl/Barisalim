<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f8dbe6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Sana Küçük Bir Mesajım Var ❤️</title>

  <style>
    :root {
      --pembe: #d93672;
      --koyu-pembe: #a72858;
      --acik-pembe: #fff2f6;
      --yesil: #43ad68;
      --golge: 0 22px 60px rgba(151, 46, 88, 0.22);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,.95), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(255,255,255,.7), transparent 24%),
        linear-gradient(160deg, #fff8fb 0%, #f8dce7 46%, #f4c8d8 100%);
      color: var(--koyu-pembe);
    }

    body {
      min-height: 100dvh;
      touch-action: manipulation;
    }

    .parilti {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.9) 0 1px, transparent 2px),
        radial-gradient(circle, rgba(255,255,255,.6) 0 1px, transparent 2px);
      background-size: 45px 45px, 72px 72px;
      background-position: 0 0, 18px 26px;
      animation: parilti 5s ease-in-out infinite alternate;
    }

    .ucusanlar {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .ucan {
      position: absolute;
      bottom: -90px;
      opacity: 0;
      filter: drop-shadow(0 5px 8px rgba(0,0,0,.08));
      animation: yukari linear forwards;
    }

    .sayfa {
      position: relative;
      z-index: 3;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(16px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    .kart {
      position: relative;
      width: min(93vw, 480px);
      min-height: 570px;
      padding: 28px 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.95);
      border-radius: 34px;
      background: rgba(255,255,255,.82);
      box-shadow: var(--golge);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
    }

    .ekran {
      display: none;
      min-height: 510px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      animation: ekranGel .7s cubic-bezier(.2,.8,.2,1);
    }

    .ekran.aktif {
      display: flex;
    }

    .zarf {
      position: relative;
      width: 190px;
      height: 132px;
      margin-bottom: 35px;
      border-radius: 10px;
      background: linear-gradient(145deg, #f78caf, #e64e82);
      box-shadow: 0 18px 30px rgba(219, 54, 114, .25);
      animation: zarfSallan 2.3s ease-in-out infinite;
    }

    .zarf::before,
    .zarf::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 10px;
    }

    .zarf::before {
      clip-path: polygon(0 0, 50% 55%, 100% 0);
      background: #ffabc5;
    }

    .zarf::after {
      clip-path: polygon(0 100%, 50% 48%, 100% 100%);
      background: #d93a70;
    }

    .zarf-kalp {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      animation: kalpAtisi .8s infinite alternate;
    }

    h1 {
      margin: 0 0 16px;
      color: var(--pembe);
      font-size: clamp(34px, 9vw, 49px);
      line-height: 1.12;
      letter-spacing: -.7px;
    }

    .daktilo {
      min-height: 64px;
    }

    .aciklama {
      margin: 0 0 27px;
      color: #8e4b64;
      font-size: 18px;
      line-height: 1.55;
    }

    button {
      border: 0;
      min-width: 145px;
      min-height: 57px;
      padding: 14px 24px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 850;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .ana-buton {
      color: #fff;
      background: linear-gradient(135deg, #ef6190, #cf2e67);
      box-shadow: 0 11px 25px rgba(207,46,103,.3);
      animation: butonNefes 1.7s ease-in-out infinite;
    }

    .muzik-kontrol {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 8;
      display: none;
      min-width: 44px;
      min-height: 44px;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      color: #fff;
      background: rgba(216, 52, 112, .8);
      box-shadow: 0 7px 16px rgba(160, 40, 80, .2);
      font-size: 19px;
    }

    .soru-ikon {
      font-size: 75px;
      margin-bottom: 10px;
      animation: kalpAtisi .8s infinite alternate;
    }

    #altMetin {
      min-height: 54px;
      margin: 5px 0 15px;
      color: #8e4b64;
      font-size: 18px;
      font-weight: 750;
    }

    .buton-alani {
      position: relative;
      width: 100%;
      min-height: 235px;
      margin-top: 4px;
    }

    #evet, #hayir {
      position: absolute;
      top: 24px;
      width: 138px;
      min-width: 138px;
    }

    #evet {
      left: 50%;
      transform: translateX(-112%);
      color: #fff;
      background: linear-gradient(135deg, #55bd76, #319e59);
      box-shadow: 0 10px 22px rgba(49,158,89,.3);
    }

    #hayir {
      left: 50%;
      transform: translateX(12%);
      color: #fff;
      background: linear-gradient(135deg, #f47792, #e54b6d);
      box-shadow: 0 10px 22px rgba(229,75,109,.27);
      transition: left .11s ease, top .11s ease, transform .11s ease;
    }

    .polaroid {
      position: relative;
      width: min(79vw, 315px);
      padding: 10px 10px 24px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 18px 42px rgba(0,0,0,.2);
      transform: rotate(-2deg);
      animation: fotografGel .9s cubic-bezier(.16,1,.3,1);
    }

    .foto {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 4px;
      background: #f4dbe4;
    }

    .polaroid-yazi {
      margin-top: 15px;
      color: #b52e5d;
      font-family: "Segoe Print", "Comic Sans MS", cursive;
      font-size: 20px;
      font-weight: 700;
    }

    .son-kalp {
      margin-top: 18px;
      font-size: 62px;
      animation: kalpAtisi .75s infinite alternate;
    }

    .son-mesaj {
      margin-top: 5px;
      color: var(--pembe);
      font-size: clamp(36px, 10vw, 53px);
      font-weight: 900;
    }

    .son-alt {
      margin-top: 8px;
      color: #8e4b64;
      font-size: 18px;
      line-height: 1.45;
    }

    .konfeti {
      position: fixed;
      top: -30px;
      z-index: 10;
      pointer-events: none;
      animation: konfetiDus 3s linear forwards;
    }

    @keyframes ekranGel {
      from { opacity: 0; transform: translateY(22px) scale(.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fotografGel {
      from { opacity: 0; transform: translateY(45px) rotate(-8deg) scale(.78); }
      to { opacity: 1; transform: translateY(0) rotate(-2deg) scale(1); }
    }

    @keyframes kalpAtisi {
      from { transform: scale(1); }
      to { transform: scale(1.18); }
    }

    @keyframes zarfSallan {
      0%, 100% { transform: rotate(-2deg) translateY(0); }
      50% { transform: rotate(2deg) translateY(-8px); }
    }

    @keyframes butonNefes {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.055); }
    }

    @keyframes yukari {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      12% { opacity: .95; }
      100% { transform: translateY(-125vh) rotate(360deg); opacity: 0; }
    }

    @keyframes konfetiDus {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @keyframes parilti {
      from { opacity: .45; transform: scale(1); }
      to { opacity: .85; transform: scale(1.04); }
    }

    @media (max-width: 390px) {
      .kart {
        min-height: 590px;
        padding-left: 13px;
        padding-right: 13px;
      }

      .ekran {
        min-height: 525px;
      }

      #evet, #hayir {
        width: 126px;
        min-width: 126px;
        font-size: 17px;
      }

      #evet {
        left: 48%;
        transform: translateX(-100%);
      }

      #hayir {
        left: 52%;
        transform: translateX(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

<body>
  <div class="parilti"></div>
  <div class="ucusanlar" id="ucusanlar"></div>

  <!-- İsteğe bağlı: Aynı klasöre muzik.mp3 koyarsan Devam Et'e basınca çalar. -->
  <audio id="muzik" loop preload="none">
    <source src="muzik.mp3" type="audio/mpeg" />
  </audio>

  <main class="sayfa">
    <section class="kart">
      <button class="muzik-kontrol" id="muzikKontrol" type="button" aria-label="Müziği aç veya kapat">🔊</button>

      <div class="ekran aktif" id="girisEkrani">
        <div class="zarf" aria-hidden="true">
          <div class="zarf-kalp">❤️</div>
        </div>
        <h1 class="daktilo" id="daktiloYazi"></h1>
        <p class="aciklama">Sana kalbimden gelen küçük bir şey hazırladım…</p>
        <button class="ana-buton" id="devam" type="button">Mektubu Aç 💌</button>
      </div>

      <div class="ekran" id="soruEkrani">
        <div class="soru-ikon">💗</div>
        <h1>Benimle barışır mısın?</h1>
        <div id="altMetin">Bence kalbinin cevabı belli 😊</div>

        <div class="buton-alani" id="butonAlani">
          <button id="evet" type="button">Evet ❤️</button>
          <button id="hayir" type="button">Hayır</button>
        </div>
      </div>

      <div class="ekran" id="sonucEkrani">
        <div class="polaroid">
          <img
            class="foto"
            src="foto.jpeg"
            alt="İkimizin fotoğrafı"
            onerror="this.style.display='none'; document.getElementById('fotoUyari').style.display='block';"
          />
          <div id="fotoUyari" style="display:none; padding:45px 12px; color:#a72858; font-weight:700;">
            Fotoğrafı <b>foto.jpeg</b> adıyla aynı klasöre koy ❤️
          </div>
          <div class="polaroid-yazi">Sen & Ben ❤️</div>
        </div>

        <div class="son-kalp">❤️</div>
        <div class="son-mesaj">İyi ki varsın</div>
        <div class="son-alt">Seni bugün, yarın ve her zaman çok seviyorum.</div>
      </div>
    </section>
  </main>

  <script>
    const girisEkrani = document.getElementById("girisEkrani");
    const soruEkrani = document.getElementById("soruEkrani");
    const sonucEkrani = document.getElementById("sonucEkrani");
    const devam = document.getElementById("devam");
    const evet = document.getElementById("evet");
    const hayir = document.getElementById("hayir");
    const altMetin = document.getElementById("altMetin");
    const butonAlani = document.getElementById("butonAlani");
    const ucusanlar = document.getElementById("ucusanlar");
    const muzik = document.getElementById("muzik");
    const muzikKontrol = document.getElementById("muzikKontrol");
    const daktiloYazi = document.getElementById("daktiloYazi");

    const acilisMetni = "Hayatım, seni çok seviyorum";
    const hayirMesajlari = [
      "Emin misin? 🥺",
      "Bir daha düşünür müsün? 😢",
      "Kalbimi kırma lütfen 💔",
      "Son kararın mı gerçekten? 🌼",
      "Tamam, artık Hayır'a basamazsın 😄"
    ];

    let yazimIndex = 0;
    let hayirSayaci = 0;
    let kacisModu = false;
    let sonKacis = 0;
    let muzikCalabiliyor = false;
    let muzikAcik = false;
    let ucusDongusu = null;

    function daktiloYaz() {
      if (yazimIndex < acilisMetni.length) {
        daktiloYazi.textContent += acilisMetni.charAt(yazimIndex);
        yazimIndex++;
        setTimeout(daktiloYaz, 75);
      }
    }

    setTimeout(daktiloYaz, 450);

    devam.addEventListener("click", async function () {
      girisEkrani.classList.remove("aktif");
      soruEkrani.classList.add("aktif");

      try {
        muzik.volume = 0.42;
        await muzik.play();
        muzikCalabiliyor = true;
        muzikAcik = true;
        muzikKontrol.style.display = "block";
        muzikKontrol.textContent = "🔊";
      } catch (hata) {
        muzikCalabiliyor = false;
        muzikKontrol.style.display = "none";
      }

      if (!ucusDongusu) {
        ucusDongusu = setInterval(ucanOlustur, 550);
      }
    });

    muzikKontrol.addEventListener("click", async function () {
      if (!muzikCalabiliyor) return;

      if (muzikAcik) {
        muzik.pause();
        muzikAcik = false;
        muzikKontrol.textContent = "🔇";
      } else {
        try {
          await muzik.play();
          muzikAcik = true;
          muzikKontrol.textContent = "🔊";
        } catch (hata) {}
      }
    });

    function rastgeleKonumaKac() {
      const alan = butonAlani.getBoundingClientRect();
      const buton = hayir.getBoundingClientRect();
      const bosluk = 8;

      const maxX = Math.max(bosluk, alan.width - buton.width - bosluk);
      const maxY = Math.max(bosluk, alan.height - buton.height - bosluk);

      hayir.style.transform = "none";
      hayir.style.left = Math.floor(bosluk + Math.random() * Math.max(1, maxX - bosluk)) + "px";
      hayir.style.top = Math.floor(bosluk + Math.random() * Math.max(1, maxY - bosluk)) + "px";
    }

    function hayiraBasmaDenemesi(event) {
      if (kacisModu) {
        event.preventDefault();
        event.stopPropagation();
        rastgeleKonumaKac();
        return;
      }

      hayirSayaci++;
      altMetin.textContent =
        hayirMesajlari[Math.min(hayirSayaci - 1, hayirMesajlari.length - 1)];

      if (hayirSayaci >= hayirMesajlari.length) {
        kacisModu = true;
        hayir.textContent = "Yakalayamazsın 😄";
        rastgeleKonumaKac();
      }
    }

    hayir.addEventListener("click", hayiraBasmaDenemesi);

    hayir.addEventListener("touchstart", function (event) {
      if (kacisModu) {
        event.preventDefault();
        event.stopPropagation();
        rastgeleKonumaKac();
      }
    }, { passive: false });

    document.addEventListener("pointermove", function (event) {
      if (!kacisModu || event.pointerType === "touch") return;

      const simdi = Date.now();
      if (simdi - sonKacis < 100) return;

      const rect = hayir.getBoundingClientRect();
      const merkezX = rect.left + rect.width / 2;
      const merkezY = rect.top + rect.height / 2;
      const mesafe = Math.hypot(event.clientX - merkezX, event.clientY - merkezY);

      if (mesafe < 115) {
        sonKacis = simdi;
        rastgeleKonumaKac();
      }
    });

    evet.addEventListener("click", function () {
      soruEkrani.classList.remove("aktif");
      sonucEkrani.classList.add("aktif");

      for (let i = 0; i < 55; i++) {
        setTimeout(ucanOlustur, i * 55);
      }

      konfetiPatlat();
    });

    function ucanOlustur() {
      const eleman = document.createElement("div");
      const semboller = ["❤️", "💕", "💗", "🤍", "🌼", "🌼", "✨"];

      eleman.className = "ucan";
      eleman.textContent = semboller[Math.floor(Math.random() * semboller.length)];
      eleman.style.left = Math.random() * 100 + "vw";
      eleman.style.fontSize = 19 + Math.random() * 31 + "px";
      eleman.style.animationDuration = 4.2 + Math.random() * 3 + "s";

      ucusanlar.appendChild(eleman);
      setTimeout(() => eleman.remove(), 7800);
    }

    function konfetiPatlat() {
      const semboller = ["❤️", "🌼", "✨", "💕", "🤍"];

      for (let i = 0; i < 60; i++) {
        const parca = document.createElement("div");
        parca.className = "konfeti";
        parca.textContent = semboller[Math.floor(Math.random() * semboller.length)];
        parca.style.left = Math.random() * 100 + "vw";
        parca.style.fontSize = 14 + Math.random() * 22 + "px";
        parca.style.animationDelay = Math.random() * .8 + "s";
        parca.style.animationDuration = 2.4 + Math.random() * 1.6 + "s";
        document.body.appendChild(parca);
        setTimeout(() => parca.remove(), 5000);
      }
    }

    for (let i = 0; i < 16; i++) {
      setTimeout(ucanOlustur, i * 220);
    }
  </script>
</body>
</html>
